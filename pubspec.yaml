name: sultan
description: "Sultan Restoran boshqaruv tizimi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.9.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  local_auth: ^2.1.8
  image_picker: ^1.0.7
  path_provider: ^2.1.3
  pdf: ^3.10.8
  printing: ^5.12.0
  open_filex: ^4.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# Bitta icon -> Android / Windows / Web
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  web:
    generate: true
    background_color: "#2F80ED"
    theme_color: "#2F80ED"
  windows:
    generate: true
    icon_size: 256